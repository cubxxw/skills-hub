<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: #fff; }
        #status { padding: 10px; margin: 10px 0; border-radius: 5px; font-weight: bold; }
        .connected { background: #22c55e; color: #000; }
        .disconnected { background: #ef4444; }
        #logs { background: #000; padding: 10px; border-radius: 5px; min-height: 150px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>WebSocket 连接测试</h1>
    <div id="status" class="disconnected">Status: Disconnected</div>
    <div id="logs"></div>
    
    <script>
        const logs = document.getElementById('logs');
        const status = document.getElementById('status');
        const wsUrl = 'ws://8.220.240.187:5000/ws';
        
        function log(msg) {
            logs.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + logs.innerHTML;
        }
        
        log(`尝试连接：${wsUrl}`);
        const ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            status.className = 'connected';
            status.textContent = 'Status: ✅ Connected!';
            log('✅ WebSocket 连接成功!');
            log('📨 发送测试消息...');
            ws.send(JSON.stringify({type: 'test', data: 'hello from browser'}));
        };
        
        ws.onclose = () => {
            status.className = 'disconnected';
            status.textContent = 'Status: ❌ Disconnected';
            log('❌ WebSocket 连接关闭');
        };
        
        ws.onerror = (e) => {
            log('❌ WebSocket 错误：' + JSON.stringify(e));
        };
        
        ws.onmessage = (e) => {
            log('📨 收到消息：' + e.data);
        };
    </script>
</body>
</html>
